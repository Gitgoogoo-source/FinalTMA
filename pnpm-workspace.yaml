packages:
  - "apps/*"
  - "packages/*"
  - "contracts"

allowBuilds:
  esbuild: true

catalog:
  # -----------------------------
  # Core runtime
  # -----------------------------
  react: "^19.2.6"
  react-dom: "^19.2.6"
  react-router-dom: "^7.15.1"

  # -----------------------------
  # Telegram Mini App
  # -----------------------------
  "@tma.js/sdk-react": "^3.0.19"

  # -----------------------------
  # TON / TON Connect
  # -----------------------------
  "@tonconnect/ui-react": "^2.0.12"
  "@ton/core": "^0.63.1"
  "@ton/crypto": "^3.3.0"
  "@ton/ton": "^16.2.4"

  # -----------------------------
  # Supabase
  # -----------------------------
  "@supabase/supabase-js": "^2.106.0"
  supabase: "2.100.1"

  # -----------------------------
  # Vercel Functions
  # -----------------------------
  "@vercel/node": "^5.7.15"

  # -----------------------------
  # Frontend data / state
  # -----------------------------
  "@tanstack/react-query": "^5.100.11"
  zustand: "^5.0.13"
  zod: "^4.4.0"

  # -----------------------------
  # Frontend build
  # -----------------------------
  vite: "^8.0.13"
  "@vitejs/plugin-react": "^6.0.2"
  typescript: "^6.0.3"

  # -----------------------------
  # Styling
  # -----------------------------
  tailwindcss: "^4.0.0"
  "@tailwindcss/vite": "^4.0.0"
  clsx: "^2.1.1"

  # -----------------------------
  # Node / scripts
  # -----------------------------
  tsx: "^4.22.3"
  rimraf: "^6.1.3"

  # -----------------------------
  # Testing
  # -----------------------------
  vitest: "^4.1.7"
  "@playwright/test": "^1.60.0"

  # -----------------------------
  # Tooling
  # -----------------------------
  "@types/node": "^24.0.0"
  eslint: "^10.4.0"
  prettier: "^3.8.3"
  vercel: "^54.1.0"

catalogs:
  react:
    react: "^19.2.6"
    react-dom: "^19.2.6"
    "@types/react": "^19.2.14"
    "@types/react-dom": "^19.2.3"

  vite:
    vite: "^8.0.13"
    "@vitejs/plugin-react": "^6.0.2"
    "@tailwindcss/vite": "^4.0.0"

  telegram:
    "@tma.js/sdk-react": "^3.0.19"

  ton:
    "@tonconnect/ui-react": "^2.0.12"
    "@ton/core": "^0.63.1"
    "@ton/crypto": "^3.3.0"
    "@ton/ton": "^16.2.4"

  supabase:
    "@supabase/supabase-js": "^2.106.0"
    supabase: "2.100.1"

  test:
    vitest: "^4.1.7"
    "@playwright/test": "^1.60.0"

  tooling:
    typescript: "^6.0.3"
    tsx: "^4.22.3"
    "@types/node": "^24.0.0"
    eslint: "^10.4.0"
    prettier: "^3.8.3"
    rimraf: "^6.1.3"
    vercel: "^54.1.0"

minimumReleaseAgeExclude:
  - "@vitest/expect@4.1.7"
  - "@vitest/mocker@4.1.7"
  - "@vitest/pretty-format@4.1.7"
  - "@vitest/runner@4.1.7"
  - "@vitest/snapshot@4.1.7"
  - "@vitest/spy@4.1.7"
  - "@vitest/utils@4.1.7"
  - vitest@4.1.7
