<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="theme-color" content="#091416" />
    <title>Monster Tamer</title>
    <base href="/monster-tamer/" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="vendor/webfontloader-1.6.28.min.js"></script>
    <script src="vendor/phaser-3.60.0.min.js"></script>
  </head>
  <body>
    <main class="game-shell">
      <a
        class="app-back-button"
        href="/game"
        aria-label="Return to the game center"
        >‹ 返回游戏</a
      >

      <div
        class="game-container"
        id="game-container"
        role="application"
        aria-label="Monster Tamer game"
      ></div>

      <section class="touch-controls" aria-label="Game controls">
        <div class="direction-pad" aria-label="Movement controls">
          <button
            class="touch-control direction-up"
            type="button"
            data-control="up"
            aria-label="Move up"
          >
            ▲
          </button>
          <button
            class="touch-control direction-left"
            type="button"
            data-control="left"
            aria-label="Move left"
          >
            ◀
          </button>
          <span class="direction-pad-center" aria-hidden="true"></span>
          <button
            class="touch-control direction-right"
            type="button"
            data-control="right"
            aria-label="Move right"
          >
            ▶
          </button>
          <button
            class="touch-control direction-down"
            type="button"
            data-control="down"
            aria-label="Move down"
          >
            ▼
          </button>
        </div>

        <div class="utility-controls" aria-label="Utility controls">
          <button
            class="touch-control utility-control"
            type="button"
            data-control="menu"
            aria-label="Open or close menu"
          >
            菜单
          </button>
          <button
            class="touch-control utility-control"
            type="button"
            data-control="fullscreen"
            aria-label="Toggle fullscreen"
          >
            全屏
          </button>
        </div>

        <div class="action-controls" aria-label="Action controls">
          <button
            class="touch-control action-secondary"
            type="button"
            data-control="back"
            aria-label="Go back or hold to run"
          >
            <span class="action-key">B</span>
            <span class="action-label">返回 / 跑</span>
          </button>
          <button
            class="touch-control action-primary"
            type="button"
            data-control="confirm"
            aria-label="Confirm or interact"
          >
            <span class="action-key">A</span>
            <span class="action-label">确认</span>
          </button>
        </div>
      </section>
    </main>

    <noscript>Monster Tamer requires JavaScript.</noscript>
    <script src="src/main.js" type="module"></script>
  </body>
</html>
